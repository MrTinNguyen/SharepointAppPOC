name: AI Multi-Agent Workflow

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ─── Job 1: Full pipeline ──────────────────────────────────────────────────
  run-ai-agents:
    name: AI Pipeline (Orchestrator)
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'ai-task')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install agent dependencies
        run: npm install --prefix agents

      - name: Run Master Orchestrator
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node agents/orchestrator/index.js

  # ─── Job 2: PR review ──────────────────────────────────────────────────────
  review-pr:
    name: AI PR Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install agent dependencies
        run: npm install --prefix agents

      - name: Run PR Review Agent
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node agents/reviewer/index.js

  # ─── Job 3: DevOps deployment ──────────────────────────────────────────────
  # Triggered on push to main (after PR merge).
  # npm ci + heft build are run inside the agent itself.
  deploy:
    name: AI DevOps Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install agent dependencies
        run: npm install --prefix agents

      - name: Run DevOps Agent
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHAREPOINT_CATALOG_URL: ${{ secrets.SHAREPOINT_CATALOG_URL }}
          M365_USERNAME: ${{ secrets.M365_USERNAME }}
          M365_PASSWORD: ${{ secrets.M365_PASSWORD }}
        run: node agents/devops/index.js
